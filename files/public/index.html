<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyVault — Student Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1209;
      --paper: #f5f0e8;
      --cream: #ede7d6;
      --accent: #b5451b;
      --accent2: #2c6e49;
      --muted: #7a6e5f;
      --border: #c9b99a;
      --card-bg: #faf7f2;
      --shadow: 4px 4px 0px #c9b99a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(180,160,120,0.15) 27px,
          rgba(180,160,120,0.15) 28px
        );
      background-size: 100% 28px;
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid var(--accent);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .header-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--border);
      text-align: right;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ── FORM PANEL ── */
    .form-panel {
      background: var(--card-bg);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.75rem;
      position: sticky;
      top: 80px;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 0.6rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-title::before {
      content: '✦';
      color: var(--accent);
      font-size: 0.9rem;
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--paper);
      border: 1.5px solid var(--border);
      color: var(--ink);
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
      border-radius: 0;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: 2px solid var(--accent);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.18s, color 0.18s, transform 0.1s;
    }
    .btn-submit:hover {
      background: var(--ink);
      border-color: var(--ink);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--accent);
    }
    .btn-submit:active { transform: translate(0,0); box-shadow: none; }

    /* ── NOTES PANEL ── */
    .notes-panel {}

    .notes-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 0.5rem;
    }

    .notes-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 900;
    }

    #note-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.75rem;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    /* Notes grid */
    .notes-grid {
      display: grid;
      gap: 1.1rem;
    }

    .note-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      padding: 1.25rem 1.4rem;
      position: relative;
      transition: transform 0.18s, box-shadow 0.18s;
      animation: slideIn 0.35s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .note-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 5px 5px 0 var(--border);
    }

    .note-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
    }

    .note-card[data-subject="Mathematics"]::before { background: #2c6e49; }
    .note-card[data-subject="Physics"]::before     { background: #1d4e89; }
    .note-card[data-subject="Chemistry"]::before   { background: #7b2d8b; }
    .note-card[data-subject="Biology"]::before     { background: #c05e2a; }
    .note-card[data-subject="History"]::before     { background: #8b6914; }
    .note-card[data-subject="Computer Science"]::before { background: #b5451b; }

    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .note-subject {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--cream);
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--border);
    }

    .note-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--border);
    }

    .note-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .note-content {
      font-size: 0.88rem;
      color: #3d3325;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .note-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.9rem;
    }

    .btn-delete {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.65rem;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-delete:hover {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-style: italic;
    }
    .empty-state .big-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.75rem 1.25rem;
      border-left: 4px solid var(--accent);
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Study<span>Vault</span></div>
  <div class="header-meta">
    IIIT Tiruchirappalli<br>
    CS515 — Unix Programming
  </div>
</header>

<div class="container">

  <!-- FORM -->
  <aside class="form-panel">
    <div class="panel-title">New Note</div>
    <form id="note-form" onsubmit="return false;">
      <label>Subject</label>
      <select id="subject" required>
        <option value="">— Select —</option>
        <option>Mathematics</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Biology</option>
        <option>History</option>
        <option>Computer Science</option>
        <option>Other</option>
      </select>

      <label>Title</label>
      <input type="text" id="title" placeholder="e.g. Newton's Laws of Motion" required/>

      <label>Content</label>
      <textarea id="content" placeholder="Write your note here…" required></textarea>

      <button class="btn-submit" onclick="addNote()">Save Note →</button>
    </form>
  </aside>

  <!-- NOTES LIST -->
  <main class="notes-panel">
    <div class="notes-header">
      <div class="notes-heading">My Notes</div>
      <div id="note-count">Loading…</div>
    </div>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="filterNotes('all', this)">All</button>
    </div>

    <div class="notes-grid" id="notes-grid"></div>
  </main>
</div>

<div id="toast"></div>

<script>
  let allNotes = [];
  let activeFilter = 'all';

  async function loadNotes() {
    try {
      const res = await fetch('/api/notes');
      allNotes = await res.json();
      renderNotes();
      buildFilters();
    } catch (e) {
      showToast('Error loading notes');
    }
  }

  function buildFilters() {
    const subjects = [...new Set(allNotes.map(n => n.subject))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = `<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="filterNotes('all', this)">All</button>`;
    subjects.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (activeFilter === s ? ' active' : '');
      btn.textContent = s;
      btn.onclick = function() { filterNotes(s, this); };
      bar.appendChild(btn);
    });
  }

  function filterNotes(subject, btn) {
    activeFilter = subject;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNotes();
  }

  function renderNotes() {
    const grid = document.getElementById('notes-grid');
    const filtered = activeFilter === 'all' ? allNotes : allNotes.filter(n => n.subject === activeFilter);
    const count = document.getElementById('note-count');
    count.textContent = `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><span class="big-icon">📓</span>No notes yet. Add your first one!</div>`;
      return;
    }

    grid.innerHTML = filtered.map(note => `
      <div class="note-card" data-subject="${note.subject}">
        <div class="note-meta">
          <span class="note-subject">${note.subject}</span>
          <span class="note-date">${formatDate(note.created_at)}</span>
        </div>
        <div class="note-title">${escHtml(note.title)}</div>
        <div class="note-content">${escHtml(note.content)}</div>
        <div class="note-footer">
          <button class="btn-delete" onclick="deleteNote(${note.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function addNote() {
    const subject = document.getElementById('subject').value;
    const title   = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!subject || !title || !content) { showToast('Please fill all fields'); return; }

    try {
      const res = await fetch('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subject, title, content })
      });
      if (!res.ok) throw new Error();
      document.getElementById('subject').value = '';
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      showToast('Note saved ✓');
      loadNotes();
    } catch {
      showToast('Error saving note');
    }
  }

  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
      await fetch(`/api/notes/${id}`, { method: 'DELETE' });
      showToast('Note deleted');
      loadNotes();
    } catch {
      showToast('Error deleting note');
    }
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadNotes();
</script>
</body>
</html>
