apiVersion: v1
kind: Service
metadata:
  name: notes-db-service
spec:
  type: ClusterIP
  selector:
    app: notes-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: notes-db-secret
type: Opaque
stringData:
  db-user: notesuser
  db-password: notespass
